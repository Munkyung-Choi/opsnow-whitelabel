name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Type Check ────────────────────────────────────────────────
  # 빠른 코드 품질 검사 — 환경 변수 불필요, PR 즉시 피드백
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests (Vitest)
        run: npx vitest run

  # ── Job 2: Build ────────────────────────────────────────────────────────────
  # quality 통과 후 실행 — Next.js 빌드 성공 여부 검증
  # 필요한 GitHub Secrets:
  #   - NEXT_PUBLIC_SUPABASE_URL
  #   - NEXT_PUBLIC_SUPABASE_ANON_KEY
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # supabaseAdmin(service_role)이 모듈 레벨에서 초기화되므로 빌드 시 필요
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # WL-51 Impersonation 쿠키 HMAC 서명용 — CI 격리 환경 전용 고정 값
          IMPERSONATION_SIGNING_SECRET: 'ci-only-not-a-real-secret-do-not-use-in-production'

  # ── Job 3: Supabase Type Drift ───────────────────────────────────────────────
  # DB 스키마 변경 후 gen:types 누락 감지 — quality와 병렬 실행
  # 필요한 GitHub Secrets:
  #   - SUPABASE_ACCESS_TOKEN (Supabase Dashboard → Account → Access Tokens)
  type-drift:
    name: Supabase Type Drift
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check Supabase type drift
        run: |
          supabase gen types typescript --project-id gzkmsiskdbtuxpeaqwcp > /tmp/supabase-gen.ts
          if ! diff src/types/supabase.ts /tmp/supabase-gen.ts; then
            echo "::error::DB 스키마와 타입이 불일치합니다. 로컬에서 'npm run gen:types'를 실행하고 커밋하세요."
            exit 1
          fi
          echo "Supabase 타입 동기화 확인 완료"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ── Job 4: E2E Tests ─────────────────────────────────────────────────────────
  # build 통과 후 실행 — 파트너별 섹션 렌더링 회귀 자동 감지 (WL-85)
  # 필요한 GitHub Secrets:
  #   - NEXT_PUBLIC_SUPABASE_URL
  #   - NEXT_PUBLIC_SUPABASE_ANON_KEY
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # partner-a.localhost → 127.0.0.1 등록 (서브도메인 라우팅 지원)
      - name: Add partner subdomains to /etc/hosts
        run: |
          echo "127.0.0.1 partner-a.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-b.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-c.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-d.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-test-hidden.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-test-null-title.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 partner-test-empty-contents.localhost" | sudo tee -a /etc/hosts
          echo "127.0.0.1 admin-whitelabel.localhost" | sudo tee -a /etc/hosts

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # WL-102: service_role — globalSetup/globalTeardown에서 테스트 파트너 seed/cleanup 용
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # WL-51 Impersonation 쿠키 HMAC 서명용 — 빌드와 동일 값(CI 격리)
          IMPERSONATION_SIGNING_SECRET: 'ci-only-not-a-real-secret-do-not-use-in-production'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
